# 工作流名称
name: Build Satisfactory Server Manager to EXE

# 触发条件：
# 1. 手动触发（方便测试）
# 2. 推送v开头的标签（如v0.1.4，规范发布版本）
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# 工作流任务
jobs:
  build-windows-exe:
    # 使用Windows最新环境（EXE仅支持Windows）
    runs-on: windows-latest
    
    steps:
      # 步骤1：拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：设置Python环境（适配你的代码，建议3.10）
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 缓存依赖，加速后续构建

      # 步骤3：安装项目依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：用PyInstaller打包EXE（核心步骤，适配你的GUI程序）
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller -F -w --name "幸福工厂服务器管理器" --noupx satisfactory_controller.py
          # 参数说明：
          # -F：打包成单个EXE文件（方便分发）
          # -w：隐藏控制台窗口（GUI程序必备，避免运行时弹出黑窗口）
          # --name：指定EXE文件名
          # --noupx：禁用UPX压缩（避免部分杀毒软件误报）

      # 步骤5：验证打包结果
      - name: Check build result
        run: |
          dir dist\
          # 输出dist目录内容，确认EXE文件生成

      # 步骤6：创建Release并上传EXE
      - name: Create Release and Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          # 上传dist目录下的所有文件（主要是EXE）
          files: |
            dist/*.exe
          # 自动生成Release说明
          body: |
            ## 幸福工厂服务器管理器自动构建版本
            - 基于Python 3.10 + PyInstaller打包
            - 包含功能：服务器安装/启停/备份/监控/自动更新
            - 运行环境：Windows 7/10/11（64位）
        env:
          # GitHub自动提供的Token，无需手动配置
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
