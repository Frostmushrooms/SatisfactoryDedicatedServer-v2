# 工作流名称
name: Build Satisfactory Server Manager to EXE

# 触发条件：
# 1. 手动触发（测试用）
# 2. 推送v开头的标签（正式发布用）
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# 工作流任务
jobs:
  build-windows-exe:
    # 使用Windows最新环境（EXE仅支持Windows）
    runs-on: windows-latest
    
    steps:
      # 步骤1：拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：设置Python环境（3.10兼容性最佳）
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 缓存依赖，加速构建

      # 步骤3：安装项目依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：用PyInstaller打包EXE（适配GUI程序）
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller -F -w --name "satisfactory_controller" --noupx satisfactory_controller.py
          # 参数说明：
          # -F：单文件EXE（方便分发）
          # -w：隐藏控制台（GUI程序必备）
          # --name：自定义EXE文件名
          # --noupx：禁用压缩，避免杀毒软件误报

      # 步骤5：上传EXE为工作流产物（手动触发时可直接下载）
      - name: Upload EXE as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: 幸福工厂服务器管理器-EXE
          path: dist/*.exe
          retention-days: 30 # 产物保留30天

      # 步骤6：创建Release并上传EXE（仅打标签时执行）
      - name: Create Release and Upload EXE (only on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-SatisfactoryDedicatedServer-v2
        with:
          # 上传dist目录下的EXE文件
          files: |
            dist/*.exe
          # 自动生成Release说明
          body: |
            ## 幸福工厂服务器管理器 v${{ github.ref_name }}
            ### 自动构建信息
            - Python版本：3.10
            - 打包工具：PyInstaller
            - 构建环境：Windows Server 2022
            ### 修复日志
            ✅ 新增网络测试按钮，检查网络联通情况
            ✅ 新增网络代理面板
            ✅优化界面布局
            ✅优化缩放窗口时显示不全问题
          # 自动生成版本标题
          name: 幸福工厂服务器管理器 v${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
